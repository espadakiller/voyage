<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#123f4d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Voyage Balkans">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Voyage Balkans - Nouveau parcours</title>
  <script defer src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <style>/*__STYLES__*/</style>
</head>
<body>
  <a class="skip-link" href="#main">Aller au contenu</a>
  <div class="shell">
    <header class="appbar">
      <div class="brand"><span class="brand-kicker">Interrail 29 jours</span><span class="brand-name">Voyage Balkans</span></div>
      <span class="version">Nouveau parcours</span>
    </header>
    <aside class="safety" aria-label="Rappel important">
      <i data-lucide="triangle-alert" aria-hidden="true"></i>
      <div><strong>Horaires a reverifier</strong><span>7 jours puis 48 h avant chaque train, ferry, bus et frontiere.</span></div>
    </aside>
    <main id="main">
      <section id="routeView" aria-label="Itineraire"></section>
      <section id="dayView" aria-label="Jour selectionne" hidden></section>
      <section id="progressView" aria-label="Progression" hidden></section>
    </main>
  </div>
  <nav class="bottom-nav" aria-label="Navigation principale">
    <button class="nav-button" type="button" data-view="route" aria-current="page"><i data-lucide="route"></i><span>Itineraire</span></button>
    <button class="nav-button" type="button" data-view="day"><i data-lucide="map-pinned"></i><span>Mon jour</span></button>
    <button class="nav-button" type="button" data-view="progress"><i data-lucide="circle-check-big"></i><span>Progression</span></button>
  </nav>
  <script>const DATA=__ITINERARY_DATA__;/*__APP__*/</script>
</body>
</html>
