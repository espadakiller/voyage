  <script>
const VERIFY_NOTE = "Horaires a verifier 48h avant.";
const CHECKLIST = [

const LOCATION_COORDS = {
  "Strasbourg": [7.7521, 48.5734], "Verone": [10.9916, 45.4384], "Trieste": [13.7768, 45.6495],
  "Ljubljana": [14.5058, 46.0569], "Zagreb": [15.9819, 45.8150], "Travnik/Jajce": [17.48, 44.25],

  "Ulcinj": [19.2183, 41.9311], "Shkoder": [19.5126, 42.0683], "Kruje": [19.7978, 41.5095],

const state = { stops: [], selected: 0, view: "route", filter: "all", query: "" };

function escapeHtml(value = "") {
  return String(value).replace(/[&<>'"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[ch]));
}
function slugText(value = "") { return String(value).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase(); }
function stopText(stop) { return slugText(JSON.stringify(stop)); }
function selectedStop() { return state.stops[state.selected] || state.stops[0]; }
function cityForStop(stop) { return stop.sleep_city || stop.name?.split(String.fromCharCode(0x2192)).pop()?.trim() || stop.name; }
function coordsForStop(stop) {
  const candidates = [cityForStop(stop), ...(stop.name || "").split(String.fromCharCode(0x2192)).map(x => x.trim()), stop.transport_next?.to].filter(Boolean);
  for (const name of candidates) {
    for (const key of Object.keys(LOCATION_COORDS).sort((a,b) => b.length - a.length)) {
      if (slugText(name).includes(slugText(key))) return LOCATION_COORDS[key];
    }
  }
  return null;
}
function googleMapsSearch(label, city) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(label + " " + (city || ""))}`;
}
function googleMapsRoute(stop) {
  const parts = (stop.name || "").split(String.fromCharCode(0x2192)).map(x => x.trim());
  const origin = parts[0] || cityForStop(stop);
  const destination = parts[1] || stop.transport_next?.to || cityForStop(stop);
  return `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&travelmode=transit`;
}
function visitMap(stop, city) {
  const main = (stop.must_see || []).map(name => ({ name, optional: false }));
  const extras = [...(stop.quiet_spots || []), ...(stop.hikes || [])].map(name => ({ name, optional: true }));
  const places = [...main, ...extras].filter((item, index, all) => all.findIndex(other => other.name === item.name) === index);
  if (!places.length) return '<p class="small">Aucune visite geolocalisee pour cette etape.</p>';
  const origin = city || stop.sleep_city || stop.name;
  const destination = main[main.length - 1] ? main[main.length - 1].name : origin;
  const waypoints = main.slice(0, -1).map(place => encodeURIComponent(place.name + " " + origin)).join("|");
  const google = "https://www.google.com/maps/dir/?api=1&origin=" + encodeURIComponent(origin) + "&destination=" + encodeURIComponent(destination + " " + origin) + (waypoints ? "&waypoints=" + waypoints : "") + "&travelmode=walking";
  const apple = "https://maps.apple.com/?saddr=" + encodeURIComponent(origin) + "&daddr=" + encodeURIComponent(destination + " " + origin) + "&dirflg=w";
  return '<div id="visit-map-' + stop.day + '" class="real-map"><div class="real-map-status">Chargement de la carte reelle...<br>Une connexion internet est necessaire pour afficher les lieux.</div></div>' +
    '<div class="actions"><a class="action" href="' + google + '" target="_blank" rel="noreferrer">Parcours Google Maps</a><a class="action secondary" href="' + apple + '" target="_blank" rel="noreferrer">Plans Apple</a></div>' +
    '<ol class="visit-route-list">' + places.map((point, index) => '<li><span class="visit-number-small">' + (Number(index) + 1) + '</span><span><a href="' + googleMapsSearch(point.name, origin) + '" target="_blank" rel="noreferrer">' + escapeHtml(point.name) + '</a>' + (point.optional ? ' <span class="visit-optional">option / calme / rando</span>' : "") + '</span></li>').join("") + '</ol>';
}
let leafletPromise = null;
const geocodeCacheKey = "voyage-balkans-geocode-v1";
function loadLeaflet() {
  if (window.L) return Promise.resolve();
  if (leafletPromise) return leafletPromise;
  leafletPromise = new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.src = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
  return leafletPromise;
}
function sleepMs(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}
async function geocodeVisit(name, city, country) {
  const cache = JSON.parse(localStorage.getItem(geocodeCacheKey) || "{}");
  const key = name + "|" + city;
  if (cache[key]) return cache[key];
  const query = encodeURIComponent(name + ", " + city + ", " + (country || ""));
  const response = await fetch("https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q=" + query, { headers: { "Accept-Language": "fr" } });
  if (!response.ok) return null;
  const results = await response.json();
  if (!results.length) return null;
  const location = { lat: Number(results[0].lat), lon: Number(results[0].lon), name: name };
  if (!Number.isFinite(location.lat) || !Number.isFinite(location.lon)) return null;
  cache[key] = location;
  localStorage.setItem(geocodeCacheKey, JSON.stringify(cache));
  return location;
}
async function initVisitLeaflet(stop, city) {
  const element = document.getElementById("visit-map-" + stop.day);
  if (!element) return;
  try {
    await loadLeaflet();
    const places = [...(stop.must_see || []), ...(stop.quiet_spots || []), ...(stop.hikes || [])].filter((name, index, all) => all.indexOf(name) === index);
    const locations = [];
    for (let index = 0; index < places.length; index += 1) {
      if (index > 0) await sleepMs(1100);
      try {
        const location = await geocodeVisit(places[index], city, stop.country);
        if (location) locations.push({ ...location, index });
      } catch (error) {}
    }
    if (!locations.length) {
      element.innerHTML = "<div class='real-map-status'>Les lieux n'ont pas pu etre localises.<br>Utilise les boutons Google Maps ou Plans Apple ci-dessous.</div>";
      return;
    }
    element.innerHTML = "";
    const map = L.map(element, { scrollWheelZoom: false });
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);
    const line = locations.map(location => [location.lat, location.lon]);
    L.polyline(line, { color: "#c6554a", weight: 4, opacity: 0.9 }).addTo(map);
    locations.forEach(location => {
      const marker = L.marker([location.lat, location.lon], {
        icon: L.divIcon({ className: "visit-pin", html: "<span>" + (Number(location.index) + 1) + "</span>", iconSize: [30, 30], iconAnchor: [15, 15] })
      }).addTo(map);
      marker.bindPopup("<b>" + (Number(location.index) + 1) + ". " + escapeHtml(location.name) + "</b>");
    });
    map.fitBounds(L.latLngBounds(line).pad(0.18));
    setTimeout(() => map.invalidateSize(), 100);
  } catch (error) {
    element.innerHTML = "<div class='real-map-status'>La carte interactive n'est pas disponible sans connexion.<br>Utilise les boutons Google Maps ou Plans Apple ci-dessous.</div>";
  }
}

function tagsFor(stop) {
  const tags = [];
  if (stop.departure_latest) tags.push(`<span class="pill blue">Depart max ${escapeHtml(stop.departure_latest)}</span>`);
  if (stop.sleep_city) tags.push(`<span class="pill green">Nuit ${escapeHtml(stop.sleep_city)}</span>`);
  if (stop.transport_next?.night_train || (stop.night_train_options || []).length) tags.push(`<span class="pill red">Train de nuit</span>`);
  if (stop.transport_next && stop.transport_next.mode !== "train") tags.push(`<span class="pill">${escapeHtml(stop.transport_next.mode)}</span>`);
  return tags.join("");
}
function matchesFilter(stop) {
  const text = stopText(stop);
  if (state.query && !text.includes(slugText(state.query))) return false;
  if (state.filter === "ottoman") return text.includes("ottoman") || text.includes("mosquee") || text.includes("bazar") || text.includes("hammam") || text.includes("tekke");
  if (state.filter === "hike") return (stop.hikes || []).length > 0 || text.includes("rando") || text.includes("vue");
  if (state.filter === "night") return Boolean(stop.transport_next?.night_train || (stop.night_train_options || []).length);
  if (state.filter === "bus") return stop.transport_next?.mode === "bus" || text.includes("bus non inclus");
  return true;
}
function setView(view) {
  state.view = view;
  document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.view === view));
  render();
}
function chooseDay(index, view = "day") {

}

  if (!items || !items.length) return `<p class="small">Rien de special ici.</p>`;

}
function budget(stop) {

    <div class="budget-cell"><b>${total} EUR</b><span class="small">Total estime</span></div>

function dayCard(stop, index) {
  return `<button type="button" class="day-card ${index === state.selected ? "active" : ""}" data-day="${index}">
    <span class="day-badge">J${stop.day}</span>

}
function renderRoute() {
  const stops = state.stops.filter(matchesFilter);
  app.innerHTML = `${routeMap(state.selected)}<div class="route-grid">${stops.map(stop => dayCard(stop, state.stops.indexOf(stop))).join("") || `<div class="empty">Aucun resultat.</div>`}</div>`;
  app.querySelectorAll("[data-day]").forEach(button => button.addEventListener("click", () => chooseDay(Number(button.dataset.day))));
}
function renderDay() {
  const stop = selectedStop();
  const city = cityForStop(stop);

  const night = stop.night_train_options || [];
  app.innerHTML = `<article class="stack">
    <section class="card detail-head">
      <div class="meta"><span class="pill">J${stop.day}</span><span class="pill green">${escapeHtml(stop.country || "")}</span></div>
      <h2>${escapeHtml(stop.name)}</h2>

      <span class="meta">${tagsFor(stop)}</span>
      <div class="actions"><button class="action secondary" id="prevDay" type="button">Jour precedent</button><button class="action" id="nextDay" type="button">Jour suivant</button></div>
    </section>
    <section class="detail-grid">

        <section class="card white"><h3 class="section-title">A voir</h3>${listItems(stop.must_see, city)}</section>

        <section class="card"><h3 class="section-title">Transport suivant</h3><p class="small"><b>${escapeHtml(transport.mode || "")}</b> vers ${escapeHtml(transport.to || "")}. ${escapeHtml(transport.notes || VERIFY_NOTE)}</p><span class="meta"><span class="pill ${transport.interrail_included ? "green" : "red"}">${transport.interrail_included ? "Interrail" : "Non inclus"}</span><span class="pill ${transport.reservation_needed ? "red" : ""}">${transport.reservation_needed ? "Reservation" : "Sans reservation"}</span></span></section>
        <section class="card"><h3 class="section-title">Trains de nuit</h3>${night.length ? `<ul class="list">${night.map(item => `<li><b>${escapeHtml(item.title)}</b><br><span class="small">${escapeHtml(item.details)}</span></li>`).join("")}</ul>` : `<p class="small">Pas de train de nuit utile indique pour cette etape. ${VERIFY_NOTE}</p>`}</section>

function routeMap(activeIndex = 0, compact = false) {
  const points = state.stops.map((stop, index) => ({ stop, index, coord: coordsForStop(stop) })).filter(p => p.coord);
  const lons = points.map(p => p.coord[0]);
  const lats = points.map(p => p.coord[1]);
  const minLon = Math.min(...lons) - 1.2, maxLon = Math.max(...lons) + 1.2;
  const minLat = Math.min(...lats) - 0.9, maxLat = Math.max(...lats) + 0.9;
  const w = 760, h = compact ? 300 : 430, pad = 42;
  const xy = ([lon, lat]) => [pad + ((lon - minLon) / (maxLon - minLon)) * (w - pad * 2), h - pad - ((lat - minLat) / (maxLat - minLat)) * (h - pad * 2)];
  const path = points.map((p, i) => `${i ? "L" : "M"}${xy(p.coord).map(n => n.toFixed(1)).join(" ")}`).join(" ");
  const labels = points.filter((p, i) => i === 0 || i === points.length - 1 || p.index === activeIndex || ["Sarajevo","Kotor","Tirana","Skopje","Sofia","Budapest"].some(city => cityForStop(p.stop).includes(city)));
  return `<div class="hero-map"><svg viewBox="0 0 ${w} ${h}" role="img" aria-label="Carte simplifiee du parcours">
    <rect width="${w}" height="${h}" fill="#e7f3f8"></rect>
    <path class="map-country" d="M70 170 C170 90 230 110 300 150 S430 130 510 210 S620 250 700 190"></path>
    <path class="map-country" d="M110 290 C220 250 300 300 380 255 S560 270 680 330"></path>
    <path class="route-path-muted" d="${path}"></path><path class="route-path" d="${path}"></path>
    ${points.map(p => { const [x,y] = xy(p.coord); return `<circle class="map-dot ${p.index === activeIndex ? "active" : ""}" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${p.index === activeIndex ? 8 : 5}"></circle>`; }).join("")}
    ${labels.map(p => { const [x,y] = xy(p.coord); return `<text class="map-label" x="${x.toFixed(1)}" y="${(y - 12).toFixed(1)}" text-anchor="middle">J${p.stop.day} ${escapeHtml(cityForStop(p.stop).replace(" / ", "/"))}</text>`; }).join("")}
  </svg></div>`;
}
function render() {
  if (!state.stops.length) { app.innerHTML = `<div class="empty">Chargement impossible.</div>`; return; }
  if (state.view === "day") renderDay();
  else if (state.view === "map") renderMapView();
  else if (state.view === "search") renderSearch();
  else if (state.view === "checklist") renderChecklist();
  else renderRoute();
}
async function init() {
  try {
    const payload = window.__STOPS_DATA__;
    state.stops = payload.stops || [];
  } catch (error) {
    app.innerHTML = `<div class="empty">Impossible de charger le parcours.</div>`;
    return;
  }
  searchInput.addEventListener("input", event => { state.query = event.target.value; if (state.view !== "route") state.view = "search"; document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.view === state.view)); render(); });
  document.querySelectorAll(".chip").forEach(chip => chip.addEventListener("click", () => { state.filter = chip.dataset.filter; document.querySelectorAll(".chip").forEach(c => c.classList.toggle("active", c === chip)); render(); }));
  document.querySelectorAll(".tab").forEach(tab => tab.addEventListener("click", () => setView(tab.dataset.view)));
  document.getElementById("todayButton").addEventListener("click", () => chooseDay(state.selected, "day"));
  // Single-file mode: no service worker needed.
  render();
}
init();

  </script>
</body>
</html>
